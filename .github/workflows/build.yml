name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      BUN_VERSION: 1.3.14
      CARGO_HOME: ${{ github.workspace }}\.cargo
      CARGO_TARGET_DIR: ${{ github.workspace }}\src-tauri\target
      BUN_INSTALL: ${{ github.workspace }}\.bun
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ${{ env.BUN_INSTALL }}
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust toolchain
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Get rustc version
        id: rust-version
        run: |
          $v = rustc --version
          $v = $v -replace '[^A-Za-z0-9\.\-]', '-'
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Cache Rust dependencies and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}\registry
            ${{ env.CARGO_HOME }}\git
            ${{ env.CARGO_TARGET_DIR }}
          key: rust-${{ runner.os }}-${{ steps.rust-version.outputs.version }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ steps.rust-version.outputs.version }}-
            rust-${{ runner.os }}-

      - name: Extract Changelog
        id: changelog
        shell: pwsh
        run: |
          $notes = Get-Content CHANGELOG.md -Raw
          $notes = $notes.Trim()
          $notes | Out-File -FilePath dist-changelog.txt -Encoding utf8
          
          # 设置多行输出
          $EOF = [System.Guid]::NewGuid().ToString()
          "notes<<$EOF" >> $env:GITHUB_OUTPUT
          $notes >> $env:GITHUB_OUTPUT
          "$EOF" >> $env:GITHUB_OUTPUT

      - name: Build and Release
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Unturned Assistant v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
