name: Build
permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build-tauri:
    runs-on: windows-latest
    env:
      BUN_VERSION: 1.3.14
      CARGO_HOME: ${{ github.workspace }}\.cargo
      CARGO_TARGET_DIR: ${{ github.workspace }}\src-tauri\target
      BUN_INSTALL: ${{ github.workspace }}\.bun
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust toolchain
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Get App Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep '"version":' src-tauri/tauri.conf.json | head -1 | awk -F: '{ print $2 }' | sed 's/[", ]//g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}\registry
            ${{ env.CARGO_HOME }}\git
            ${{ env.CARGO_TARGET_DIR }}
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build and Sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          bun tauri build
          # 手动执行签名以确保生成 .sig 文件
          bun tauri signer sign -k "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" "src-tauri/target/release/bundle/nsis/unturned-assistant_${{ steps.get_version.outputs.version }}_x64-setup.exe"

      - name: Create Release and Upload Artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Unturned Assistant v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          includeRelease: true
